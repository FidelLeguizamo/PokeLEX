<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PokeLex - Favoritos</title>
  <link rel="icon" href="src/assets/masterball.png"/>
  <link href="src/style.css" rel="stylesheet"/>
  <script type="module" src="src/main.js" defer></script>
</head>
<body data-pagina="favoritos">

<aside class="side-panel" aria-label="Navegacion">
  <div class="panel-tabs">
    <a class="panel-tab" href="index.html">Pokedex</a>
    <a class="panel-tab" href="equipo.html">Crear tu equipo</a>
    <a class="panel-tab active" href="favoritos.html">Favoritos</a>
  </div>

  <section class="panel-section active">
    <div class="panel-head">
      <h2>Favoritos</h2>
      <span id="favoriteCount">0</span>
    </div>
    <div class="mini-list" id="favoriteList"></div>
  </section>
</aside>

<header>
  <div class="logo">
    <img class="logo-ball" src="src/assets/masterball.png" alt="Master Ball"/>
    <h1>Poke<span>LEX</span></h1>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="loader" id="loader">
  <div class="pokeball"></div>
  <span class="loader-text">Cargando favoritos...</span>
</div>

<div class="state-box" id="stateEmpty">
  <h3>Sin favoritos</h3>
  <p id="emptyMsg"></p>
</div>

<div class="state-box" id="stateError">
  <h3>Error de conexion</h3>
  <p id="errorDetail"></p>
  <button class="btn-retry" id="btnRetry">Reintentar</button>
</div>

<div class="grid" id="grid"></div>

<footer>
  Datos provistos por <a href="https://pokeapi.co" target="_blank" rel="noopener">PokeAPI</a>
</footer>
</body>
</html>
